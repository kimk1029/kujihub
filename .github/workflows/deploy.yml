name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DEPLOY_USER" || { echo "DEPLOY_USER is empty"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "DEPLOY_PATH is empty"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "DEPLOY_SSH_KEY is empty"; exit 1; }
          test -n "$DATABASE_URL" || { echo "DATABASE_URL is empty"; exit 1; }
          echo "Secrets look present"

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 9922 112.169.110.183 >> ~/.ssh/known_hosts

      - name: Git pull over SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p 9922 "$DEPLOY_USER@112.169.110.183" "export KUJIHUB_APP_DIR='$DEPLOY_PATH'; bash -se" <<'EOF'
          set -euo pipefail

          mkdir -p "$KUJIHUB_APP_DIR"
          git config --global --add safe.directory "$KUJIHUB_APP_DIR"
          cd "$KUJIHUB_APP_DIR"
          if [ -d .git ]; then
            rm -f ecosystem.config.cjs
            git fetch origin master
            git checkout master
            git pull --ff-only origin master
          fi
          EOF

      - name: Sync files to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'server/node_modules/' \
            --exclude 'web/node_modules/' \
            --exclude 'android/' \
            --exclude 'ios/' \
            --exclude 'web/dist/' \
            --exclude 'server/.env' \
            --exclude 'web/.env.production' \
            -e "ssh -i ~/.ssh/deploy_key -p 9922" \
            ./ "$DEPLOY_USER@112.169.110.183:$DEPLOY_PATH/"

      - name: Build and restart over SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEB_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL }}
        run: |
          DATABASE_URL_B64=$(printf '%s' "$DATABASE_URL" | base64 -w0)
          WEB_API_BASE_URL_B64=$(printf '%s' "${WEB_API_BASE_URL:-}" | base64 -w0)
          ssh -i ~/.ssh/deploy_key -p 9922 "$DEPLOY_USER@112.169.110.183" "export KUJIHUB_APP_DIR='$DEPLOY_PATH'; export DATABASE_URL_B64='$DATABASE_URL_B64'; export WEB_API_BASE_URL_B64='$WEB_API_BASE_URL_B64'; bash -se" <<'EOF'
          set -euo pipefail

          export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
          fi

          cd "$KUJIHUB_APP_DIR"
          mkdir -p server web
          DATABASE_URL=$(printf '%s' "$DATABASE_URL_B64" | base64 -d | tr -d '\r')
          DATABASE_URL=${DATABASE_URL/localhost/127.0.0.1}
          WEB_API_BASE_URL=$(printf '%s' "$WEB_API_BASE_URL_B64" | base64 -d | tr -d '\r')
          printf 'DATABASE_URL=%s\nPORT=3000\nNODE_ENV=production\n' "$DATABASE_URL" > server/.env
          if [ -n "${WEB_API_BASE_URL:-}" ]; then
            printf 'VITE_API_BASE_URL=%s\n' "$WEB_API_BASE_URL" > web/.env.production
          fi
          command -v node >/dev/null 2>&1 || { echo "node is not installed on server"; exit 1; }
          command -v npm >/dev/null 2>&1 || { echo "npm is not installed on server"; exit 1; }
          node -v
          npm -v
          command -v yarn >/dev/null 2>&1 || npm install -g yarn
          command -v pm2 >/dev/null 2>&1 || npm install -g pm2

          yarn install --frozen-lockfile
          test -f server/.env || { echo "server/.env is missing"; exit 1; }
          (
            cd server
            set -a
            . ./.env
            set +a
            DB_HOST=$(printf '%s' "$DATABASE_URL" | sed -E 's#^postgres(ql)?://[^@]+@([^:/]+).*#\2#')
            DB_PORT=$(printf '%s' "$DATABASE_URL" | sed -E 's#^postgres(ql)?://[^@]+@[^:/]+:([0-9]+).*#\2#')
            [ "$DB_HOST" = "$DATABASE_URL" ] && DB_HOST=127.0.0.1
            [ "$DB_PORT" = "$DATABASE_URL" ] && DB_PORT=5432
            pg_isready -h "$DB_HOST" -p "$DB_PORT"
            npx prisma migrate deploy
          )
          (
            cd web
            npm ci
            npm run build
          )

          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save
          EOF
